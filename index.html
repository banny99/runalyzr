<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runalyzr</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#22c55e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Runalyzr" />
  <link rel="stylesheet" href="/src/ui/styles.css" />
</head>
<body>
  <header id="app-header">
    <h1>Runalyzr</h1>
    <div id="upload-controls">
      <label id="upload-label" for="file-input">Upload Video</label>
      <input type="file" id="file-input" accept="video/mp4,video/quicktime" />
      <button id="camera-btn">Use Camera</button>
      <button id="toggle-overlay">Toggle Overlay</button>
    </div>
  </header>

  <div id="playback-controls" style="display:none; padding: 0.5rem 1rem; background:#1a1a1a; gap:0.5rem; align-items:center; border-bottom: 1px solid #333; flex-wrap: wrap;">
    <button id="frame-back">← Frame</button>
    <button id="frame-forward">Frame →</button>
    <select id="speed-select" style="background:#2a2a2a;color:#f0f0f0;border:1px solid #444;padding:0.35rem 0.5rem;border-radius:6px;font-size:0.875rem;">
      <option value="0.25">0.25×</option>
      <option value="0.5">0.5×</option>
      <option value="1" selected>1×</option>
    </select>
  </div>

  <main>
    <!-- Section 1: Video + live metrics -->
    <section id="video-section">
      <div id="video-container">
        <video id="video" playsinline></video>
        <canvas id="overlay"></canvas>
      </div>
      <div id="live-metrics">
        <p id="cadence-display">Cadence: —</p>
        <p id="view-display">View: —</p>
      </div>
    </section>

    <!-- Section 2: Summary cards -->
    <section id="summary-cards"></section>

    <!-- Section 3: Findings -->
    <section id="findings">
      <h2>Findings</h2>
      <div id="findings-list"></div>
    </section>

    <!-- Section 4: Export -->
    <section id="export-section">
      <input type="text" id="client-name" placeholder="Client name (not stored)" />
      <textarea id="physio-notes" placeholder="Session notes..."></textarea>
      <button id="export-pdf" disabled>Export PDF</button>
    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
